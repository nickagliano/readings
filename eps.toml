[package]
name        = "readings"
version     = "0.1.0"
description = "Texts you the Catholic daily Mass readings every morning at 7am ET"
authors     = ["nickagliano"]
license     = "MIT"
platform    = ["aarch64-apple-darwin", "x86_64-apple-darwin", "x86_64-unknown-linux-gnu"]

[eps]
customization_guide = "CUSTOMIZE.md"

[system-dependencies]
brew = ["rustup"]
apt  = ["cargo"]

[service]
enabled      = true
start        = "HOST=$(tailscale ip -4) ./serve.sh"
port         = 5545
health_check = "GET /health"
